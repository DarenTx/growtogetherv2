<!-- ── Monthly Growth Entry ───────────────────────────────────── -->
<div class="gt-page">
  <div class="gt-card">
    <!-- Section label -->
    <p class="text-center text-xs font-semibold uppercase tracking-widest text-text-secondary mb-1">
      Enter Monthly Growth
    </p>

    <!-- Month display -->
    <p class="text-center text-base font-semibold text-text-base mb-3">{{ displayLabel() }}</p>

    <form
      class="gt-form"
      novalidate
      aria-label="Monthly growth entry form"
      (submit)="onSave($event)"
    >
      <!-- ── Bank Name ─────────────────────────────────────────── -->
      <div class="gt-field">
        <label class="gt-label" for="bank_name">Bank Name</label>
        <select id="bank_name" class="gt-select" [formControl]="bankControl">
          @for (opt of bankOptions(); track opt) {
            <option [value]="opt">{{ opt }}</option>
          }
        </select>
      </div>

      <!-- ── Loading / load-failed feedback ───────────────────── -->
      @if (isLoading()) {
        <p class="text-center text-[var(--color-text-muted)]">Loading…</p>
      }
      @if (loadFailed()) {
        <div class="gt-banner gt-banner-error" role="alert">
          Could not load existing data for this month. You may still enter and save a value.
        </div>
      }

      <!-- ── Growth % ──────────────────────────────────────────── -->
      <div class="gt-field">
        <label class="gt-label" for="growth_pct">Growth %</label>
        <input
          id="growth_pct"
          class="gt-input"
          type="text"
          inputmode="decimal"
          placeholder="e.g. 3.75 or -1.50"
          [formControl]="growthPctControl"
          [attr.aria-invalid]="errorMessage() !== ''"
        />
      </div>

      <!-- ── Banners ───────────────────────────────────────────── -->
      @if (successMessage()) {
        <div class="gt-banner gt-banner-success" role="status">{{ successMessage() }}</div>
      }
      @if (errorMessage()) {
        <div class="gt-banner gt-banner-error" role="alert">{{ errorMessage() }}</div>
      }

      <!-- ── Actions ───────────────────────────────────────────── -->
      <div class="gt-btn-row">
        <button class="gt-btn gt-btn-primary" type="submit" [disabled]="isSaving()">Save</button>
      </div>
    </form>
  </div>
</div>
