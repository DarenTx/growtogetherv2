<!-- ── Dashboard ────────────────────────────────────────────────── -->
<div class="gt-dash-container">
  @if (loading()) {
    <p class="gt-loading">Loading…</p>
  } @else if (errorMessage()) {
    <p class="gt-error-page">{{ errorMessage() }}</p>
  } @else {
    <app-dashboard-header
      [firstName]="profile()?.first_name"
      [isAdmin]="isAdmin()"
      (signOut)="signOut()"
    />

    @if (profile()?.id) {
      <div class="gt-scorecard-row">
        <app-classic-scorecard
          [year]="scorecardYear()"
          [month]="scorecardMonth()"
          [uuid]="profile()!.id"
          (yearChange)="onScorecardYearChange($event)"
        />
      </div>
    }

    <app-growth-grid
      [rows]="rows()"
      [selectedYear]="selectedYear()"
      [dowMonths]="dowMonths()"
      [sp500Months]="sp500Months()"
      (yearChange)="onYearChange($event)"
    />
  }
</div>
